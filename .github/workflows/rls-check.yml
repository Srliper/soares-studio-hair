name: RLS & Security Definer Check

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/rls-check.yml"
  workflow_dispatch:

jobs:
  rls-lint:
    name: Lint migrations for RLS regressions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      # SECURITY DEFINER views that are intentionally allowed.
      # Keep in sync with @security-memory.
      ALLOWED_DEFINER_VIEWS: "professionals_public,appointments_busy,time_blocks_public"

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap Supabase-like schema
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE SCHEMA IF NOT EXISTS extensions;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            email text,
            raw_user_meta_data jsonb
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS $$ SELECT NULL::text $$;
          DO $$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE service_role NOLOGIN BYPASSRLS; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          SQL

      - name: Apply migrations
        run: |
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No migrations found — skipping."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "→ Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Fetch last successful RLS report (for diff)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        continue-on-error: true
        run: |
          mkdir -p previous
          wf="${GITHUB_WORKFLOW// /%20}"
          run_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/rls-check.yml/runs?status=success&branch=${BASE_REF}&per_page=1" \
            --jq '.workflow_runs[0].id' 2>/dev/null || true)
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No previous successful run on ${BASE_REF} — skipping baseline."
            exit 0
          fi
          echo "Baseline run: $run_id"
          gh run download "$run_id" -R "$GITHUB_REPOSITORY" -n rls-report -D previous || \
            echo "Baseline artifact unavailable (may have expired)."

      - name: Run RLS checks and build report
        id: checks
        run: |
          mkdir -p report
          allowed_sql=$(printf "'%s'," ${ALLOWED_DEFINER_VIEWS//,/ } | sed 's/,$//')

          no_rls=$(psql -v ON_ERROR_STOP=1 -tAc "
            SELECT COALESCE(string_agg(c.relname, ', '), '')
            FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
            WHERE n.nspname='public' AND c.relkind='r' AND c.relrowsecurity=false;")

          definer_views=$(psql -v ON_ERROR_STOP=1 -tAc "
            SELECT COALESCE(string_agg(c.relname, ', '), '')
            FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
            WHERE n.nspname='public' AND c.relkind='v'
              AND COALESCE((SELECT option_value FROM pg_options_to_table(c.reloptions)
                            WHERE option_name='security_invoker'),'false')='false'
              AND c.relname NOT IN ($allowed_sql);")

          bad_policies=$(psql -v ON_ERROR_STOP=1 -tAc "
            SELECT COALESCE(string_agg(schemaname||'.'||tablename||':'||policyname, ', '), '')
            FROM pg_policies
            WHERE schemaname='public'
              AND ((cmd IN ('INSERT','UPDATE','DELETE','ALL') AND 'anon'=ANY(roles))
                   OR (qual='true' AND cmd IN ('UPDATE','DELETE','ALL')));")

          status() { [ -z "$1" ] && echo pass || echo fail; }
          s1=$(status "$no_rls"); s2=$(status "$definer_views"); s3=$(status "$bad_policies")

          overall=pass
          [ "$s1" = fail ] || [ "$s2" = fail ] || [ "$s3" = fail ] && overall=fail

          PREV_JSON=""
          [ -f previous/rls-report.json ] && PREV_JSON="previous/rls-report.json"
          export PREV_JSON

          python3 - <<PY
          import json, os, html
          checks = [
            {"id":"rls_enabled","name":"All public tables have RLS enabled",
             "category":"tables",
             "status":"${s1}","details":"${no_rls}".strip() or "None"},
            {"id":"definer_views","name":"No unexpected SECURITY DEFINER views",
             "category":"security_definer",
             "status":"${s2}","details":"${definer_views}".strip() or "None",
             "allowlist":os.environ["ALLOWED_DEFINER_VIEWS"].split(",")},
            {"id":"permissive_policies","name":"No anon-write / USING(true) mutation policies",
             "category":"policies",
             "status":"${s3}","details":"${bad_policies}".strip() or "None"},
          ]

          prev_path = os.environ.get("PREV_JSON") or ""
          prev = None
          if prev_path and os.path.exists(prev_path):
              try:
                  with open(prev_path) as f: prev = json.load(f)
              except Exception: prev = None

          def to_set(details):
              if not details or details == "None": return set()
              return {x.strip() for x in details.split(",") if x.strip()}

          diff = {"baseline": None, "checks": []}
          if prev:
              diff["baseline"] = {"sha": prev.get("sha",""), "run": prev.get("run",""), "overall": prev.get("overall","")}
              prev_by_id = {c["id"]: c for c in prev.get("checks", [])}
              for c in checks:
                  p = prev_by_id.get(c["id"], {})
                  cur_items = to_set(c["details"])
                  prev_items = to_set(p.get("details",""))
                  diff["checks"].append({
                      "id": c["id"], "name": c["name"], "category": c["category"],
                      "status_change": None if p.get("status") == c["status"] else f'{p.get("status","-")} → {c["status"]}',
                      "added": sorted(cur_items - prev_items),
                      "removed": sorted(prev_items - cur_items),
                  })
              # Group diff entries by category for consumers.
              cats = {}
              for d in diff["checks"]:
                  cats.setdefault(d["category"], {"added": [], "removed": [], "status_changes": []})
                  cats[d["category"]]["added"] += [f'{d["name"]}: {x}' for x in d["added"]]
                  cats[d["category"]]["removed"] += [f'{d["name"]}: {x}' for x in d["removed"]]
                  if d["status_change"]:
                      cats[d["category"]]["status_changes"].append({"check": d["name"], "change": d["status_change"]})
              diff["by_category"] = cats

          report = {
            "overall":"${overall}",
            "repo":os.environ.get("GITHUB_REPOSITORY",""),
            "sha":os.environ.get("GITHUB_SHA",""),
            "ref":os.environ.get("GITHUB_REF",""),
            "run":os.environ.get("GITHUB_RUN_ID",""),
            "checks":checks,
            "diff": diff,
          }
          with open("report/rls-report.json","w") as f: json.dump(report,f,indent=2)

          badge = {"pass":"#16a34a","fail":"#dc2626"}
          rows = "".join(
            f'<tr class="filter-row" data-category="{c["category"]}" '
            f'data-search="{html.escape(c["name"].lower())} {html.escape(c["details"].lower())}">'
            f'<td>{html.escape(c["name"])}</td>'
            f'<td style="color:{badge[c["status"]]};font-weight:600">{c["status"].upper()}</td>'
            f'<td><code>{html.escape(c["details"])}</code></td></tr>'
            for c in checks)

          if diff["baseline"]:
              b = diff["baseline"]
              drows = ""
              for d in diff["checks"]:
                  sc = d["status_change"] or "no change"
                  added = ", ".join(d["added"]) or "—"
                  removed = ", ".join(d["removed"]) or "—"
                  hay = f'{d["name"]} {added} {removed} {sc}'.lower()
                  drows += (f'<tr class="filter-row" data-category="{d["category"]}" '
                            f'data-search="{html.escape(hay)}">'
                            f'<td>{html.escape(d["name"])}</td>'
                            f'<td>{html.escape(sc)}</td>'
                            f'<td style="color:#16a34a">+ {html.escape(added)}</td>'
                            f'<td style="color:#dc2626">− {html.escape(removed)}</td></tr>')
              diff_html = (f'<h2>Diff vs last successful run</h2>'
                           f'<p>Baseline commit <code>{html.escape((b["sha"] or "")[:12])}</code> '
                           f'(run {html.escape(str(b["run"]))}, overall {html.escape(b["overall"])})</p>'
                           f'<table><thead><tr><th>Check</th><th>Status change</th><th>Added</th><th>Removed</th></tr></thead>'
                           f'<tbody>{drows}</tbody></table>')

              cat_labels = {"tables":"Tables","policies":"Policies","security_definer":"SECURITY DEFINER objects"}
              cat_order = ["tables","policies","security_definer"]
              cat_html = '<h2>Diff by category</h2>'
              cats = diff.get("by_category", {})
              any_cat = False
              for key in cat_order:
                  c = cats.get(key)
                  if not c: continue
                  if not (c["added"] or c["removed"] or c["status_changes"]):
                      continue
                  any_cat = True
                  sc_rows = "".join(
                      f'<li>{html.escape(x["check"])}: <code>{html.escape(x["change"])}</code></li>'
                      for x in c["status_changes"]) or '<li><i>no status changes</i></li>'
                  add_rows = "".join(f'<li style="color:#16a34a">+ {html.escape(x)}</li>' for x in c["added"]) or '<li><i>none</i></li>'
                  rem_rows = "".join(f'<li style="color:#dc2626">− {html.escape(x)}</li>' for x in c["removed"]) or '<li><i>none</i></li>'
                  hay = " ".join(c["added"] + c["removed"] + [x["check"] for x in c["status_changes"]]).lower()
                  cat_html += (f'<section class="filter-row cat-section" data-category="{key}" '
                               f'data-search="{html.escape(hay)}">'
                               f'<h3>{cat_labels[key]}</h3>'
                               f'<table><thead><tr><th>Status changes</th><th>Added</th><th>Removed</th></tr></thead>'
                               f'<tbody><tr>'
                               f'<td><ul>{sc_rows}</ul></td>'
                               f'<td><ul>{add_rows}</ul></td>'
                               f'<td><ul>{rem_rows}</ul></td>'
                               f'</tr></tbody></table></section>')
              if not any_cat:
                  cat_html += '<p><i>No changes in any category since the baseline.</i></p>'
              diff_html += cat_html
          else:
              diff_html = '<h2>Diff vs last successful run</h2><p><i>No baseline available.</i></p>'

          toolbar = (
            '<div class="toolbar">'
            '<input id="q" type="search" placeholder="Search tables, policies, objects…" />'
            '<label><input type="checkbox" class="catf" value="tables" checked> Tables</label>'
            '<label><input type="checkbox" class="catf" value="policies" checked> Policies</label>'
            '<label><input type="checkbox" class="catf" value="security_definer" checked> SECURITY DEFINER</label>'
            '<button id="reset" type="button">Reset</button>'
            '<button id="export" type="button">Export CSV</button>'
            '<button id="export-json" type="button">Export JSON</button>'
            '<span id="count" class="muted"></span>'
            '</div>'
          )
          diff_data_json = json.dumps(diff.get("by_category", {}))
          data_block = f'<script id="diff-data" type="application/json">{diff_data_json}</script>'
          script = """<script>
          (function(){
            const q = document.getElementById('q');
            const boxes = Array.from(document.querySelectorAll('.catf'));
            const rows = Array.from(document.querySelectorAll('.filter-row'));
            const count = document.getElementById('count');
            function apply(){
              const term = (q.value || '').trim().toLowerCase();
              const active = new Set(boxes.filter(b => b.checked).map(b => b.value));
              let shown = 0;
              rows.forEach(el => {
                const cat = el.getAttribute('data-category');
                const hay = el.getAttribute('data-search') || '';
                const ok = active.has(cat) && (!term || hay.includes(term));
                el.style.display = ok ? '' : 'none';
                if (ok) shown++;
              });
              count.textContent = shown + ' / ' + rows.length + ' items';
            }
            q.addEventListener('input', apply);
            boxes.forEach(b => b.addEventListener('change', apply));
            document.getElementById('reset').addEventListener('click', () => {
              q.value = ''; boxes.forEach(b => b.checked = true); apply();
            });
            apply();

            const dataEl = document.getElementById('diff-data');
            const byCat = dataEl ? JSON.parse(dataEl.textContent || '{}') : {};
            const esc = v => {
              const s = String(v == null ? '' : v);
              return /[",\\n\\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
            };
            function buildCsv(){
              const term = (q.value || '').trim().toLowerCase();
              const active = new Set(boxes.filter(b => b.checked).map(b => b.value));
              const lines = [['category','kind','check','item'].join(',')];
              Object.keys(byCat).forEach(cat => {
                if (!active.has(cat)) return;
                const c = byCat[cat] || {};
                (c.status_changes || []).forEach(x => {
                  const item = x.change; const check = x.check;
                  const hay = (cat + ' status_change ' + check + ' ' + item).toLowerCase();
                  if (term && !hay.includes(term)) return;
                  lines.push([cat,'status_change',check,item].map(esc).join(','));
                });
                (c.added || []).forEach(x => {
                  const [check, ...rest] = String(x).split(':');
                  const item = rest.join(':').trim();
                  const hay = (cat + ' added ' + x).toLowerCase();
                  if (term && !hay.includes(term)) return;
                  lines.push([cat,'added',check.trim(),item].map(esc).join(','));
                });
                (c.removed || []).forEach(x => {
                  const [check, ...rest] = String(x).split(':');
                  const item = rest.join(':').trim();
                  const hay = (cat + ' removed ' + x).toLowerCase();
                  if (term && !hay.includes(term)) return;
                  lines.push([cat,'removed',check.trim(),item].map(esc).join(','));
                });
              });
              return lines.join('\\n');
            }
            function buildJson(){
              const term = (q.value || '').trim().toLowerCase();
              const active = new Set(boxes.filter(b => b.checked).map(b => b.value));
              const out = [];
              Object.keys(byCat).forEach(cat => {
                if (!active.has(cat)) return;
                const c = byCat[cat] || {};
                (c.status_changes || []).forEach(x => {
                  const item = x.change; const check = x.check;
                  const hay = (cat + ' status_change ' + check + ' ' + item).toLowerCase();
                  if (term && !hay.includes(term)) return;
                  out.push({category:cat, kind:'status_change', check, item});
                });
                (c.added || []).forEach(x => {
                  const [check, ...rest] = String(x).split(':');
                  const item = rest.join(':').trim();
                  const hay = (cat + ' added ' + x).toLowerCase();
                  if (term && !hay.includes(term)) return;
                  out.push({category:cat, kind:'added', check:check.trim(), item});
                });
                (c.removed || []).forEach(x => {
                  const [check, ...rest] = String(x).split(':');
                  const item = rest.join(':').trim();
                  const hay = (cat + ' removed ' + x).toLowerCase();
                  if (term && !hay.includes(term)) return;
                  out.push({category:cat, kind:'removed', check:check.trim(), item});
                });
              });
              return JSON.stringify({generated_at: new Date().toISOString(), count: out.length, changes: out}, null, 2);
            }
            document.getElementById('export').addEventListener('click', () => {
              const csv = buildCsv();
              const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              const stamp = new Date().toISOString().replace(/[:.]/g,'-');
              a.href = url; a.download = 'rls-changes-' + stamp + '.csv';
              document.body.appendChild(a); a.click();
              setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
            });
            document.getElementById('export-json').addEventListener('click', () => {
              const json = buildJson();
              const blob = new Blob([json], {type: 'application/json;charset=utf-8'});
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              const stamp = new Date().toISOString().replace(/[:.]/g,'-');
              a.href = url; a.download = 'rls-changes-' + stamp + '.json';
              document.body.appendChild(a); a.click();
              setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
            });
          })();
          </script>"""

          h = f"""<!doctype html><meta charset=utf-8>
          <title>RLS Report — {html.escape(report['sha'][:7])}</title>
          <style>body{{font-family:system-ui;margin:2rem;max-width:960px}}
          table{{width:100%;border-collapse:collapse;margin-top:1rem}}
          td,th{{padding:.6rem;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}}
          .pill{{display:inline-block;padding:.2rem .6rem;border-radius:999px;color:#fff;background:{badge[report['overall']]}}}
          .toolbar{{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin:1rem 0;padding:.75rem;background:#f9fafb;border:1px solid #e5e7eb;border-radius:.5rem}}
          .toolbar input[type=search]{{flex:1;min-width:220px;padding:.4rem .6rem;border:1px solid #d1d5db;border-radius:.375rem;font:inherit}}
          .toolbar label{{font-size:.9rem;display:inline-flex;gap:.25rem;align-items:center}}
          .toolbar button{{padding:.35rem .75rem;border:1px solid #d1d5db;background:#fff;border-radius:.375rem;cursor:pointer}}
          .muted{{color:#6b7280;font-size:.85rem;margin-left:auto}}
          </style>
          <h1>RLS & SECURITY DEFINER Report</h1>
          <p>Overall: <span class=pill>{report['overall'].upper()}</span></p>
          <p><b>Repo:</b> {html.escape(report['repo'])} &middot;
             <b>Commit:</b> <code>{html.escape(report['sha'][:12])}</code> &middot;
             <b>Run:</b> {html.escape(report['run'])}</p>
          {toolbar}
          <table><thead><tr><th>Check</th><th>Status</th><th>Details</th></tr></thead>
          <tbody>{rows}</tbody></table>
          {diff_html}
          <p style=color:#6b7280;font-size:.85rem>Allowed SECURITY DEFINER views:
          <code>{html.escape(os.environ['ALLOWED_DEFINER_VIEWS'])}</code></p>
          {data_block}
          {script}"""
          with open("report/rls-report.html","w") as f: f.write(h)
          PY

          {
            echo "## RLS Report"
            echo ""
            echo "| Check | Status | Details |"
            echo "|---|---|---|"
            echo "| RLS enabled | $s1 | ${no_rls:-None} |"
            echo "| SECURITY DEFINER views | $s2 | ${definer_views:-None} |"
            echo "| Permissive policies | $s3 | ${bad_policies:-None} |"
            if [ -n "$PREV_JSON" ]; then
              echo ""
              echo "_Diff vs last successful run included in artifact._"
            else
              echo ""
              echo "_No baseline run available for diff._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "overall=$overall" >> "$GITHUB_OUTPUT"

          {
            echo "summary<<EOF"
            echo "| Check | Status | Details |"
            echo "|---|---|---|"
            echo "| RLS enabled | $s1 | ${no_rls:-None} |"
            echo "| SECURITY DEFINER views | $s2 | ${definer_views:-None} |"
            echo "| Permissive policies | $s3 | ${bad_policies:-None} |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: always()
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: rls-report
          path: report/

      - name: Post PR comment with report links
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERALL: ${{ steps.checks.outputs.overall }}
          SUMMARY: ${{ steps.checks.outputs.summary }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- rls-report-comment -->"
          badge=$([ "$OVERALL" = "pass" ] && echo "✅ PASS" || echo "❌ FAIL")
          body=$(cat <<EOF
          $marker
          ## 🔒 RLS & SECURITY DEFINER Report — $badge

          $SUMMARY

          - 📦 [Download \`rls-report\` artifact (HTML + JSON)]($ARTIFACT_URL)
          - 🧾 [Workflow run]($RUN_URL)
          EOF
          )
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -f body="$body" >/dev/null
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -f body="$body" >/dev/null
          fi

      - name: Fail if any check failed
        if: steps.checks.outputs.overall == 'fail'
        run: |
          echo "::error::One or more RLS checks failed — see the rls-report artifact."
          exit 1